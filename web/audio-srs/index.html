<!DOCTYPE html>
<html lang="es" data-theme="zen">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ZenHanzi · Audio Trainer</title>
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="selection:bg-sky-500/30 font-sans min-h-[100dvh] flex justify-center items-center md:py-8 md:px-4">
  <div class="absolute top-4 right-4 z-50 flex gap-2">
    <button onclick="document.documentElement.setAttribute('data-theme', 'zen')"
      class="w-4 h-4 rounded-full bg-zinc-800 border border-white/20" title="Zen Theme"></button>
    <button onclick="document.documentElement.setAttribute('data-theme', 'light')"
      class="w-4 h-4 rounded-full bg-orange-100 border border-black/20" title="Cream Theme"></button>
    <button onclick="document.documentElement.setAttribute('data-theme', 'cyberpunk')"
      class="w-4 h-4 rounded-full bg-yellow-400 border border-cyan-400" title="Cyber Theme"></button>
  </div>

  <div class="mesh-bg fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
    <div class="blob blob-1 absolute rounded-full blur-[80px] opacity-30 -top-24 -left-24 w-96 h-96"></div>
    <div class="blob blob-2 absolute rounded-full blur-[80px] opacity-30 -bottom-24 -right-24 w-[500px] h-[500px]">
    </div>
    <div class="blob blob-3 absolute rounded-full blur-[80px] opacity-20 top-1/5 right-10 w-[300px] h-[300px]"></div>
  </div>

  <div id="app"
    class="app-container w-full h-[100dvh] md:h-[800px] max-w-md relative overflow-hidden flex flex-col md:rounded-[24px]">

    <div id="toast" class="glass-panel px-6 py-2 rounded-full font-medium text-sm"></div>

    <div id="welcomeScreen" class="screen active flex-1 flex flex-col p-6 md:p-8">
      <div class="flex-1 flex flex-col justify-center items-center space-y-2">
        <h1 class="text-4xl md:text-5xl font-display font-bold tracking-tight" style="color: var(--text-main)">
          Zen<span>Hanzi</span>
        </h1>
        <p class="text-sm md:text-base font-medium tracking-wide pb-8" style="color: var(--text-muted)">
          Audio Trainer · Mandarin
        </p>

        <div class="stats-preview w-full grid grid-cols-3 gap-3 mb-10">
          <div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center">
            <span id="statDue" class="text-2xl font-bold" style="color: var(--accent)">0</span>
            <span class="text-xs uppercase tracking-widest mt-1 font-semibold"
              style="color: var(--text-muted)">Due</span>
          </div>
          <div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center">
            <span id="statNew" class="text-2xl font-bold" style="color: var(--secondary)">0</span>
            <span class="text-xs uppercase tracking-widest mt-1 font-semibold"
              style="color: var(--text-muted)">New</span>
          </div>
          <div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center">
            <span id="statFav" class="text-2xl font-bold" style="color: var(--faded-fav)">0</span>
            <span class="text-xs uppercase tracking-widest mt-1 font-semibold"
              style="color: var(--text-muted)">Fav</span>
          </div>
        </div>

        <div class="session-buttons w-full space-y-3">
          <button id="continueSrsBtn"
            class="w-full py-4 px-6 rounded-2xl font-semibold flex items-center justify-center gap-3 transition-all"
            style="background: var(--accent); color: var(--text-inv)">
            📚 Continue SRS
          </button>
          <div class="grid grid-cols-2 gap-3">
            <button id="newWordsBtn"
              class="glass-panel py-4 px-4 rounded-2xl font-medium flex items-center justify-center gap-2">
              ✨ New Words
            </button>
            <button id="favoritesBtn"
              class="glass-panel py-4 px-4 rounded-2xl font-medium flex items-center justify-center gap-2"
              style="color: var(--faded-fav)">
              ❤️ Favorites
            </button>
          </div>
        </div>
      </div>

      <div class="import-export flex justify-center gap-6 pt-6 border-t rounded-none border-white/10"
        style="color: var(--text-muted)">
        <button id="exportBtn"
          class="flex items-center gap-2 text-sm hover:text-white transition-colors">Export</button>
        <button id="importBtn"
          class="flex items-center gap-2 text-sm hover:text-white transition-colors">Import</button>
        <input type="file" id="importFile" accept=".json" class="hidden">
      </div>
    </div>

    <div id="sessionScreen" class="screen flex-1 flex flex-col p-4 md:p-6 pb-8">

      <div id="feedback"
        class="feedback-overlay feedback px-6 py-4 rounded-2xl font-bold text-center border backdrop-blur-md"></div>

      <div class="absolute top-0 left-0 w-full h-1.5 bg-white/5">
        <div id="progressFill" class="h-full w-0 transition-all duration-300"
          style="background: var(--accent); filter: drop-shadow(0 0 8px var(--accent))"></div>
      </div>

      <div class="flex items-center justify-between mb-8 mt-4 relative z-10">
        <div class="text-sm font-medium glass-panel px-3 py-1 rounded-full flex items-center gap-2"
          style="color: var(--text-muted)">
          <span id="wordCounter">0 / 0</span>
          <button id="favoriteToggleBtn" class="favorite-btn" title="Marcar favorito">♡</button>
          <button id="hideWordBtn" class="hide-btn" title="Ocultar palabra">🚫</button>
        </div>
        <button id="exitSessionBtn" class="p-2 glass-panel rounded-full transition-colors">✕</button>
      </div>

      <div class="flex-1 flex flex-col items-center justify-center text-center relative z-10">
        <div class="relative flex items-center justify-center mb-4">
          <div id="hanziDisplay"
            class="text-7xl md:text-8xl font-cjk font-normal tracking-widest text-white drop-shadow-[0_4px_16px_rgba(0,0,0,0.5)]">
            —</div>
          <div id="correctBadge">✓</div>
        </div>
        <div class="flex flex-col items-center gap-4 mb-8 h-32 justify-start">
          <div id="pinyinHint" class="text-2xl font-display font-medium h-8 flex items-center justify-center"
            style="color: var(--accent)"></div>
          <button id="replayBtn"
            class="w-12 h-12 flex shrink-0 items-center justify-center rounded-full glass-panel border-none">🔊</button>
          <button id="helpBtn"
            class="hidden px-4 py-1.5 rounded-full glass-panel text-sm flex items-center gap-2 border-none">💡 Context
            Help</button>
        </div>
      </div>

      <div class="w-full space-y-3 relative z-10">
        <div id="responseButtons" class="response-buttons space-y-3"></div>
        <div id="engineBadge" class="glass-panel mt-4 text-center text-xs font-semibold py-2 rounded-xl hidden"></div>
        <div id="voiceStatus"
          class="hidden w-full px-6 py-3 mt-4 rounded-full flex items-center justify-center gap-3 glass-panel">
          <span>🎤</span>
          <span class="text-sm font-semibold tracking-wide">Listening...</span>
          <div class="sound-wave flex gap-1 ml-2"><span></span><span></span><span></span><span></span></div>
        </div>
      </div>

      <div class="text-center text-xs mt-6 relative z-10" style="color: var(--text-muted)">
        <span class="glass-panel px-2 py-1 rounded">1-4</span> select · <span
          class="glass-panel px-2 py-1 rounded">H</span> hint · <span class="glass-panel px-2 py-1 rounded">R</span>
        replay · <span class="glass-panel px-2 py-1 rounded">Esc</span> exit
      </div>
    </div>

    <div id="summaryScreen" class="screen flex-1 flex flex-col items-center justify-center p-6 md:p-8">
      <div class="w-20 h-20 rounded-full border flex items-center justify-center mb-6 text-4xl"
        style="background: var(--surface); border-color: var(--surface-border); color: var(--accent)">✨</div>

      <h2 class="text-3xl font-display font-bold mb-2">Session Complete</h2>
      <p class="mb-10 text-center" style="color: var(--text-muted)">Great job! You're building a strong habit.</p>

      <div class="w-full grid grid-cols-3 gap-3 mb-10">
        <div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center">
          <span id="summaryReviewed" class="text-2xl font-bold">0</span>
          <span class="text-[10px] uppercase tracking-widest mt-1 font-semibold"
            style="color: var(--text-muted)">Reviewed</span>
        </div>
        <div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center">
          <span id="summaryNew" class="text-2xl font-bold">0</span>
          <span class="text-[10px] uppercase tracking-widest mt-1 font-semibold"
            style="color: var(--text-muted)">New</span>
        </div>
        <div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center">
          <span id="summaryAccuracy" class="text-2xl font-bold">0%</span>
          <span class="text-[10px] uppercase tracking-widest mt-1 font-semibold"
            style="color: var(--text-muted)">Accuracy</span>
        </div>
      </div>

      <div class="w-full space-y-3">
        <button id="newSessionBtn"
          class="w-full py-4 px-6 bg-white hover:bg-slate-200 text-slate-900 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-lg">Another
          Session</button>
        <button id="dashboardBtn"
          class="w-full py-4 px-6 glass-panel rounded-2xl font-medium flex items-center justify-center gap-3">Back to
          Home</button>
      </div>
    </div>
  </div>

  <script src="vosk.js"></script>
  <script src="app.js"></script>

</body>

</html>
