<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨 · MO — Chinese Card Study</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=Noto+Sans+SC:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>

  <style>
/* ── css/variables.css ── */
/* ════════════════════════════════════════════
   DESIGN TOKENS
   ════════════════════════════════════════════ */
:root {
  --bg:          #080a0e;
  --surface:     rgba(255,255,255,0.04);
  --surface2:    rgba(255,255,255,0.08);
  --border:      rgba(255,255,255,0.07);
  --border2:     rgba(255,255,255,0.14);
  --text:        #e8dcc8;
  --text2:       #8a7f70;
  --text3:       #4a4540;
  --accent:      #c8392b;
  --accent2:     #e8a020;
  --gold:        #d4a843;
  --card-bg:     #10141c;
  --card-border: rgba(200,180,140,0.12);
  --shadow:      0 32px 80px rgba(0,0,0,0.8), 0 8px 24px rgba(0,0,0,0.5);
  --font-zh:     'Noto Serif SC', serif;
  --font-body:   'Cormorant Garamond', serif;
  --font-mono:   'Space Mono', monospace;
  --radius:      20px;
  --ease-out:    cubic-bezier(0.23, 1, 0.32, 1);
  --transition:  0.4s var(--ease-out);
  --card-scale:  1;
}
body.light {
  --bg:          #f5f0e8;
  --surface:     rgba(0,0,0,0.04);
  --surface2:    rgba(0,0,0,0.07);
  --border:      rgba(0,0,0,0.08);
  --border2:     rgba(0,0,0,0.15);
  --text:        #1a1208;
  --text2:       #6b5d48;
  --text3:       #b0a090;
  --card-bg:     #fdf8f0;
  --card-border: rgba(80,50,20,0.15);
  --shadow:      0 32px 80px rgba(100,60,20,0.2), 0 8px 24px rgba(100,60,20,0.1);
}

/* ── css/components.css ── */
/* ════════════════════════════════════════════
   ATOMIC UI COMPONENTS
   ════════════════════════════════════════════ */

/* Buttons */
.btn-primary { padding:14px 40px; background:var(--accent); color:#fff; border-radius:40px; font-family:var(--font-mono); font-size:12px; letter-spacing:3px; display:none; transition:all var(--transition); }
.btn-primary:hover { background:#e84030; transform:translateY(-2px); box-shadow:0 12px 40px rgba(200,57,43,0.4); }

.btn-ghost { padding:10px 24px; color:var(--text2); border:1px solid var(--border2); border-radius:40px; font-family:var(--font-mono); font-size:10px; letter-spacing:2px; transition:all var(--transition); }
.btn-ghost:hover { color:var(--text); border-color:var(--text2); }

.btn-ghost-accent { color:var(--accent2); border-color:rgba(232,160,32,0.3); }
.btn-ghost-accent:hover { background:rgba(232,160,32,0.08); border-color:var(--accent2); color:var(--accent2); }

.icon-btn { width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:15px; color:var(--text2); transition:all 0.2s; }
.icon-btn:hover { background:var(--surface2); color:var(--text); border-color:var(--border2); }

.mode-toggle { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:30px; padding:3px; }
.mode-btn { padding:4px 12px; border-radius:24px; font-family:var(--font-mono); font-size:9px; letter-spacing:1px; color:var(--text3); transition:all 0.2s; }
.mode-btn.active { background:var(--accent); color:#fff; }

.rate-btn { padding:11px 22px; border-radius:40px; border:1.5px solid; font-family:var(--font-mono); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; transition:all var(--transition); }
.rate-btn:hover  { transform:translateY(-3px); }
.rate-btn:active { transform:scale(0.97); }
.btn-wrong   { background:rgba(138,42,42,0.15); border-color:rgba(138,42,42,0.4);  color:#e07070; }
.btn-almost  { background:rgba(122,96,32,0.15); border-color:rgba(122,96,32,0.4);  color:#d4a843; }
.btn-correct { background:rgba(58,138,90,0.15); border-color:rgba(58,138,90,0.4);  color:#5ab87a; }
.btn-wrong:hover   { background:rgba(138,42,42,0.3);  box-shadow:0 8px 28px rgba(138,42,42,0.3); }
.btn-almost:hover  { background:rgba(122,96,32,0.3);  box-shadow:0 8px 28px rgba(122,96,32,0.3); }
.btn-correct:hover { background:rgba(58,138,90,0.3);  box-shadow:0 8px 28px rgba(58,138,90,0.3); }

.btn-hide { padding:6px 16px; border-radius:40px; border:1px solid var(--border2); font-family:var(--font-mono); font-size:9px; letter-spacing:1.5px; color:var(--text3); transition:all 0.2s; }
.btn-hide:hover { color:var(--accent); border-color:var(--accent); }

.stroke-btn { position:absolute; top:13px; right:14px; padding:4px 10px; border:1px solid var(--border2); border-radius:20px; background:var(--surface); font-family:var(--font-mono); font-size:9px; letter-spacing:1px; color:var(--text2); transition:all 0.2s; z-index:5; }
.stroke-btn:hover { border-color:#4a8fa8; color:#4a8fa8; }

.btn-stroke-replay,.btn-stroke-close { padding:8px 20px; border-radius:30px; font-family:var(--font-mono); font-size:10px; letter-spacing:2px; transition:all 0.2s; }
.btn-stroke-replay { border:1px solid var(--border2); color:var(--accent2); }
.btn-stroke-replay:hover { background:var(--surface2); border-color:var(--accent2); }
.btn-stroke-close  { border:1px solid var(--border);  color:var(--text3); }
.btn-stroke-close:hover { color:var(--text); border-color:var(--border2); }

.btn-key-save { font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:var(--accent2); padding:8px 10px; border:1px solid rgba(232,160,32,0.3); border-radius:20px; transition:all 0.2s; white-space:nowrap; width: 100%; background: transparent; cursor: pointer; }
.btn-key-save:hover { background:rgba(232,160,32,0.1); }
.btn-key-save.saved { color:#5ab87a; border-color:rgba(90,184,122,0.4); }

.audio-btn, #sentence-audio-btn { width:28px; height:28px; border-radius:50%; border:1px solid var(--border2); background:var(--surface); color:var(--text2); display:flex; align-items:center; justify-content:center; transition:all 0.2s; z-index:5; font-size: 10px; cursor: pointer; }
.audio-btn { position:absolute; top:13px; left:14px; }
.audio-btn:hover, #sentence-audio-btn:hover { border-color:var(--accent2); background:rgba(232,160,32,0.08); color:var(--accent2); }
.audio-btn.playing, #sentence-audio-btn.playing { border-color:var(--accent2); background:rgba(232,160,32,0.12); color:var(--accent2); }
.audio-btn.loading, #sentence-audio-btn.loading { color:var(--text3); border-color:var(--border); pointer-events:none; }
.audio-btn.loading svg, #sentence-audio-btn.loading svg { animation:spin 0.9s linear infinite; transform-origin:center; }

/* Stats & Forms */
.stat-pill { display:flex; align-items:center; gap:5px; padding:5px 11px; background:var(--surface); border:1px solid var(--border); border-radius:20px; font-family:var(--font-mono); font-size:10px; color:var(--text2); }
.stat-pill .val { color:var(--text); font-weight:700; }
.stat-pill.streak .val { color:var(--accent2); }
.stat-pill.acc    .val { color:#5ab87a; }

.scale-wrap { display:flex; align-items:center; gap:7px; padding:4px 10px; background:var(--surface); border:1px solid var(--border); border-radius:20px; }
.scale-wrap span { font-family:var(--font-mono); font-size:9px; color:var(--text3); }
#scale-slider { -webkit-appearance:none; appearance:none; width:68px; height:3px; background:var(--border2); border-radius:2px; outline:none; cursor:pointer; }
#scale-slider::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:var(--accent2); cursor:pointer; box-shadow:0 0 5px rgba(232,160,32,0.5); }
#scale-slider::-moz-range-thumb { width:12px; height:12px; border-radius:50%; background:var(--accent2); border:none; cursor:pointer; }

.progress-track { position:fixed; top:60px; left:0; right:0; height:2px; background:var(--surface2); z-index:30; }
.progress-fill  { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); box-shadow:0 0 8px var(--accent); transition:width 0.6s var(--ease-out); }

/* Toast */
#toast { position:fixed; bottom:108px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--surface2); border:1px solid var(--border2); border-radius:30px; padding:9px 18px; font-family:var(--font-mono); font-size:10px; letter-spacing:2px; color:var(--text2); opacity:0; pointer-events:none; z-index:50; transition:opacity 0.25s ease,transform 0.25s ease; white-space:nowrap; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── css/screens.css ── */
/* ════════════════════════════════════════════
   SCREEN SYSTEM
   ════════════════════════════════════════════ */
.screen { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; visibility:hidden; transition:opacity 0.4s ease, visibility 0s 0.4s; }
.screen.active { opacity:1; visibility:visible; transition:opacity 0.4s ease, visibility 0s 0s; }

/* ════════════════════════════════════════════
   IMPORT SCREEN
   ════════════════════════════════════════════ */
#screen-import { gap:26px; padding:40px; text-align:center; }
.logo { font-family:var(--font-zh); font-size:72px; font-weight:700; color:var(--text); letter-spacing:-4px; line-height:1; }
.logo span { color:var(--accent); }
.logo-sub { font-family:var(--font-mono); font-size:11px; letter-spacing:6px; color:var(--text3); text-transform:uppercase; margin-top:6px; }
.drop-zone { width:380px; height:185px; border:1.5px dashed var(--border2); border-radius:var(--radius); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; cursor:pointer; transition:all var(--transition); background:var(--surface); position:relative; overflow:hidden; }
.drop-zone::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 50% 50%,var(--accent) 0%,transparent 70%); opacity:0; transition:opacity 0.3s; }
.drop-zone:hover::before,.drop-zone.drag-over::before { opacity:0.06; }
.drop-zone:hover { border-color:var(--accent); }
.drop-icon { font-size:34px; }
.drop-text { font-family:var(--font-body); font-size:18px; color:var(--text2); font-style:italic; }
.drop-hint { font-family:var(--font-mono); font-size:10px; color:var(--text3); letter-spacing:2px; }
#file-input { display:none; }
.word-count-badge { font-family:var(--font-mono); font-size:11px; color:var(--accent2); letter-spacing:3px; display:none; }

.api-keys-container { display: flex; flex-direction: column; gap: 8px; width: 380px; margin: 0 auto; }
.api-key-wrap { display:flex; align-items:center; gap:8px; padding:8px 14px; background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius); width: 100%; }
.api-key-label { font-family:var(--font-mono); font-size:9px; letter-spacing:1.5px; color:var(--text3); white-space:nowrap; width: 85px; text-align: left; }
#minimax-key, #openrouter-key { flex:1; background:transparent; border:none; outline:none; font-family:var(--font-mono); font-size:11px; color:var(--text); caret-color:var(--accent2); width: 100%; }
#minimax-key::placeholder, #openrouter-key::placeholder { color:var(--text3); }

.import-actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; align-items:center; }
.storage-stat { font-family:var(--font-mono); font-size:9px; letter-spacing:1px; color:var(--text3); text-align:center; }

/* ════════════════════════════════════════════
   STUDY SCREEN — TOP BAR & BOTTOM AREA
   ════════════════════════════════════════════ */
#screen-study { flex-direction:column; gap:0; padding:0; }
.top-bar { position:fixed; top:0; left:0; right:0; height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 22px; z-index:30; background:linear-gradient(to bottom,rgba(8,10,14,0.92) 0%,transparent 100%); }
body.light .top-bar { background:linear-gradient(to bottom,rgba(245,240,232,0.92) 0%,transparent 100%); }
.top-left  { display:flex; align-items:center; gap:12px; }
.top-right { display:flex; align-items:center; gap:9px; }
.top-logo  { font-family:var(--font-zh); font-size:22px; font-weight:700; color:var(--text); letter-spacing:-1px; }
.top-logo span { color:var(--accent); }

.bottom-area { position:fixed; bottom:0; left:0; right:0; padding:14px 28px 26px; display:flex; flex-direction:column; align-items:center; gap:11px; z-index:30; background:linear-gradient(to top,rgba(8,10,14,1) 0%,rgba(8,10,14,0.97) 55%,rgba(8,10,14,0) 100%); }
body.light .bottom-area { background:linear-gradient(to top,rgba(245,240,232,1) 0%,rgba(245,240,232,0.97) 55%,rgba(245,240,232,0) 100%); }

.flip-hint { font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--text3); text-transform:uppercase; animation:blink 2.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:0.4} 50%{opacity:1} }
.rating-row { display:flex; gap:11px; opacity:0; transform:translateY(8px); visibility:hidden; transition:opacity 0.3s ease,transform 0.3s ease, visibility 0s 0.3s; }
.rating-row.visible { opacity:1; transform:translateY(0); visibility:visible; transition:opacity 0.3s ease,transform 0.3s ease, visibility 0s 0s; }

.key-hints { position:fixed; bottom:94px; right:18px; display:flex; flex-direction:column; gap:4px; opacity:0.28; pointer-events:none; }
.key-hint  { display:flex; align-items:center; gap:5px; font-family:var(--font-mono); font-size:8px; color:var(--text2); }
kbd { padding:2px 5px; border:1px solid var(--border2); border-radius:3px; font-size:8px; color:var(--text3); font-family:var(--font-mono); }

/* ════════════════════════════════════════════
   RESULTS SCREEN
   ════════════════════════════════════════════ */
#screen-results { gap:22px; padding:40px; text-align:center; }
.results-title    { font-family:var(--font-zh); font-size:52px; font-weight:700; color:var(--text); letter-spacing:-2px; }
.results-subtitle { font-family:var(--font-body); font-size:20px; font-style:italic; color:var(--text2); }
.results-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; width:100%; max-width:420px; }
.result-card  { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px 10px; display:flex; flex-direction:column; align-items:center; gap:5px; }
.result-val   { font-family:var(--font-mono); font-size:34px; font-weight:700; line-height:1; }
.result-val.green{color:#5ab87a;} .result-val.red{color:#e07070;} .result-val.gold{color:var(--gold);}
.result-label { font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:var(--text3); text-transform:uppercase; }
.results-actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.results-actions .btn-primary { display:inline-block; }

@media(max-width:520px){
  .stat-pill.acc,.scale-wrap,.key-hints{display:none;}
  .rate-btn{padding:10px 14px;font-size:9px;}
}

/* ── css/card.css ── */
/* ════════════════════════════════════════════
   CARD — SCENE / FLIPPER / FACES
   ════════════════════════════════════════════ */
.card-area { flex:1; display:flex; align-items:center; justify-content:center; width:100%; padding:70px 20px 155px; }

.card-scene {
  width:520px; height:350px;
  max-width:calc(100vw - 40px);
  transform:scale(var(--card-scale));
  transform-origin:center center;
  transition:transform 0.15s var(--ease-out);
  perspective:1400px;
}
.card-scene.entering { animation:scene-enter 0.45s var(--ease-out) both; }
@keyframes scene-enter {
  from { opacity:0; transform:scale(calc(var(--card-scale)*0.94)) translateY(22px); }
  to   { opacity:1; transform:scale(var(--card-scale)) translateY(0); }
}

.card-flipper {
  width:100%; height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.65s var(--ease-out);
}
.card-flipper.flipped { transform:rotateY(180deg); }

.card-face {
  position:absolute; inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:var(--radius);
  background:var(--card-bg);
  border:1px solid var(--card-border);
  box-shadow:var(--shadow);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; padding:32px; overflow:hidden;
}
.card-back { transform:rotateY(180deg); }

.card-wm { position:absolute; font-family:var(--font-zh); font-size:130px; font-weight:700; line-height:1; color:rgba(200,57,43,0.03); pointer-events:none; transition:color 0.5s; }
body.light .card-wm { color:rgba(100,40,20,0.05); }
.card-wm.tl { top:-20px; left:4px; }
.card-wm.br { bottom:-20px; right:4px; transform:rotate(180deg); }

.card-label { position:absolute; top:16px; font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--text3); text-transform:uppercase; }

.mastery-badge { position:absolute; bottom:14px; display:flex; align-items:center; gap:7px; }
.mastery-lbl   { font-family:var(--font-mono); font-size:8px; letter-spacing:2px; color:var(--text3); }
.mastery-dots  { display:flex; gap:4px; }
.mdot { width:6px; height:6px; border-radius:50%; background:var(--border2); transition:background 0.3s; }
.mdot.lit { background:var(--accent2); }
.mdot.hidden-lit { background:var(--accent); }

.hanzi-display { font-family:var(--font-zh); font-size:clamp(52px,9vw,86px); font-weight:400; color:var(--text); letter-spacing:6px; text-align:center; line-height:1.2; position:relative; z-index:1; }

.pinyin-row { height:28px; display:flex; align-items:center; justify-content:center; }
.pinyin-display { font-family:'Noto Sans SC',sans-serif; font-size:17px; font-weight:300; color:var(--accent2); letter-spacing:4px; text-align:center; opacity:0; transform:translateY(6px); transition:opacity 0.5s ease,transform 0.5s ease; }
.pinyin-display.visible { opacity:1; transform:translateY(0); }

.back-hanzi  { font-family:var(--font-zh); font-size:22px; color:var(--text2); letter-spacing:3px; }
.back-pinyin { font-family:'Noto Sans SC',sans-serif; font-size:12px; color:var(--accent2); opacity:0.7; letter-spacing:2px; }
.translation { font-family:var(--font-body); font-style:italic; font-size:clamp(16px,3vw,26px); color:var(--text); text-align:center; letter-spacing:0.5px; line-height:1.4; }

/* ════════════════════════════════════════════
   SENTENCE IN CARD
   ════════════════════════════════════════════ */
.card-sentence { 
  margin-top: 18px;
  width: 100%; display: flex; flex-direction: column; gap: 8px; 
  align-items: center; justify-content: center; 
  opacity: 0; visibility: hidden; 
  transition: opacity 0.3s ease, visibility 0s 0.3s; 
}
.card-sentence.visible { opacity: 1; visibility: visible; transition: opacity 0.3s ease, visibility 0s 0s; }
#sentence-front {
  flex-direction: row; flex-wrap: wrap;
}
#sentence-zh { font-family:var(--font-zh); font-size: 1rem; color: var(--text); text-align: center; cursor: default; }
#sentence-zh mark { background: none; color: var(--accent); font-weight: 600; }
#sentence-zh.skeleton { width: 150px; height: 16px; background: rgba(255,255,255,0.05); border-radius: 4px; animation: blink 1.5s infinite; }
body.light #sentence-zh.skeleton { background: rgba(0,0,0,0.05); }
#sentence-es { font-family: var(--font-body); font-style: italic; font-size: 0.9rem; color: var(--text2); text-align: center; }

/* ════════════════════════════════════════════
   STROKE MODAL
   ════════════════════════════════════════════ */
.modal-overlay { position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.82); opacity:0; visibility:hidden; transition:opacity 0.3s ease, visibility 0s 0.3s; }
.modal-overlay.open { opacity:1; visibility:visible; transition:opacity 0.3s ease, visibility 0s 0s; }
.stroke-panel { background:var(--card-bg); border:1px solid var(--card-border); border-radius:var(--radius); padding:26px 30px 22px; display:flex; flex-direction:column; align-items:center; gap:18px; box-shadow:var(--shadow); min-width:260px; }
.stroke-title { font-family:var(--font-zh); font-size:18px; color:var(--text2); letter-spacing:3px; }
#stroke-chars { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
.stroke-char-wrap { display:flex; flex-direction:column; align-items:center; gap:6px; }
.stroke-char-lbl  { font-family:var(--font-zh); font-size:13px; color:var(--text2); }
.stroke-actions { display:flex; gap:10px; }

/* ── css/animations.css ── */
/* ════════════════════════════════════════════
   FEEDBACK ANIMATIONS
   ════════════════════════════════════════════ */
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
.anim-shake { animation:shake 0.4s ease; }

<script>
/* ── js/state.js ── */
/* ──────────────────────────────────────────────
   SETTINGS MODULE
   ────────────────────────────────────────────── */
const Settings = (() => {
  const D = { theme: 'dark', cardScale: 1, sessionSize: 30, minimaxKey: '', openrouterKey: '' };
  let s = { ...D };
  function load() {
    try { s = { ...D, ...MoSettings.all() }; } catch (e) { s = { ...D }; }
  }
  function get(k) { return s[k]; }
  function set(k, v) { s[k] = v; MoSettings.set(k, v); }
  return { load, get, set };
})();

/* ──────────────────────────────────────────────
   APP STATE — single source of truth
   ────────────────────────────────────────────── */
const State = {
  dictionary: [],
  current: null,
  mode: 'zh-es',
  isFlipped: false,
  session: { correct: 0, wrong: 0, total: 0, streak: 0, bestStreak: 0, count: 0 },
};

/* ── js/srs.js ── */
/* ──────────────────────────────────────────────
   SRS MODULE
   ────────────────────────────────────────────── */
const SRS = (() => {
  let db = {};
  async function load() {
    try {
      const all = await MoDB.getAllSRS();
      db = {};
      all.forEach(item => { const id = item.id; delete item.id; db[id] = item; });
    } catch (e) { db = {}; }
  }
  async function save() {
    for (const [id, obj] of Object.entries(db)) {
      await MoDB.putSRS({ id, ...obj });
    }
  }
  function get(w) { if (!db[w]) db[w] = { interval: 1, ease: 2.5, due: 0, reps: 0, lapses: 0, hidden: false }; return db[w]; }
  async function update(w, r) {
    const d = get(w); d.reps++;
    if (r === 0) { d.lapses++; d.interval = 1; d.ease = Math.max(1.3, d.ease - .2); }
    else if (r === 1) { d.interval = Math.max(1, Math.round(d.interval * 1.2)); }
    else { d.interval = Math.round(d.interval * d.ease); d.ease = Math.min(3, d.ease + .1); }
    d.due = Date.now() + d.interval * 3600 * 1000;
    await MoDB.putSRS({ id: w, ...d });
  }
  async function hide(w) { get(w).hidden = true; await MoDB.putSRS({ id: w, ...get(w) }); }
  function score(w) {
    const d = db[w];
    if (!d) return 0;
    if (d.interval < 2) return 0;
    if (d.interval < 8) return 1;
    if (d.interval < 20) return 2;
    if (d.interval < 50) return 3;
    if (d.interval < 140) return 4;
    return 5;
  }
  function isHidden(w) { return !!(db[w] && db[w].hidden); }
  function pick(words) {
    const visible = words.filter(w => !isHidden(w[0]));
    const pool = visible.length > 0 ? visible : words;
    const now = Date.now();
    const newCards = [];
    const dueCards = [];
    const notDueCards = [];

    for (const w of pool) {
      const d = db[w[0]];
      if (!d) newCards.push(w);
      else if (d.due <= now) dueCards.push(w);
      else notDueCards.push(w);
    }

    let bucket;
    if (dueCards.length > 0 && newCards.length > 0) {
      bucket = Math.random() < 0.70 ? dueCards : newCards;
    } else if (dueCards.length > 0) {
      bucket = dueCards;
    } else if (newCards.length > 0) {
      bucket = newCards;
    } else {
      bucket = notDueCards;
    }

    return bucket[Math.floor(Math.random() * bucket.length)];
  }
  function exportAll() {
    return JSON.stringify(db, null, 2);
  }
  async function importAll(raw) {
    try {
      const incoming = JSON.parse(raw);
      Object.assign(db, incoming);
      for (const [id, obj] of Object.entries(incoming)) {
        await MoDB.putSRS({ id, ...obj });
      }
      return Object.keys(incoming).length;
    } catch (e) { return 0; }
  }
  return { load, save, get, update, hide, score, isHidden, pick, exportAll, importAll };
})();

/* ── js/audioDb.js ── */
/* ──────────────────────────────────────────────
   INDEXEDDB AUDIO STORAGE
   Stores raw ArrayBuffer for MP3 audio
   ────────────────────────────────────────────── */
const AudioDB = (() => {
  async function saveWordAudio(hanzi, arrayBuffer) {
    const existing = await MoDB.getAudio(hanzi);
    await MoDB.putAudio({
      id: hanzi,
      wordAudio: arrayBuffer,
      sentenceAudios: existing ? existing.sentenceAudios : [],
      source: 'minimax'
    });
  }

  async function loadWordAudio(hanzi) {
    const a = await MoDB.getAudio(hanzi);
    return a && a.wordAudio ? a.wordAudio : null;
  }

  async function saveSentenceAudio(hanzi, index, arrayBuffer) {
    const a = (await MoDB.getAudio(hanzi)) || { id: hanzi, sentenceAudios: [] };
    a.sentenceAudios = a.sentenceAudios || [];
    a.sentenceAudios = a.sentenceAudios.filter(sa => sa.index !== index);
    a.sentenceAudios.push({ index, audio: arrayBuffer });
    await MoDB.putAudio(a);
  }

  async function loadSentenceAudio(hanzi, index) {
    const a = await MoDB.getAudio(hanzi);
    if (!a || !a.sentenceAudios) return null;
    const found = a.sentenceAudios.find(sa => sa.index === index);
    return found ? found.audio : null;
  }

  async function exportAll() {
    const all = await MoDB.getAll(MoDB.S.AUDIO);
    const result = { word: {}, sentence: {} };
    for (const a of all) {
      if (a.wordAudio) result.word[a.id] = MoDB.bufferToBase64(a.wordAudio);
      for (const sa of (a.sentenceAudios || [])) {
        result.sentence[`${a.id}:${sa.index}`] = MoDB.bufferToBase64(sa.audio);
      }
    }
    return result;
  }

  async function importAll(data) {
    if (!data) return 0;
    let count = 0;
    if (data.word) {
      for (const [hanzi, b64] of Object.entries(data.word)) {
        try {
          const existing = await MoDB.getAudio(hanzi);
          await MoDB.putAudio({
            id: hanzi,
            wordAudio: MoDB.base64ToBuffer(b64),
            sentenceAudios: existing ? existing.sentenceAudios : [],
            source: 'import'
          });
          count++;
        } catch (e) {
          console.warn(`Failed importing word audio for ${hanzi}`);
        }
      }
    }
    if (data.sentence) {
      for (const [key, b64] of Object.entries(data.sentence)) {
        const [hanzi, indexStr] = key.split(':');
        const index = parseInt(indexStr, 10);
        try {
          const existing = (await MoDB.getAudio(hanzi)) || { id: hanzi, sentenceAudios: [] };
          existing.sentenceAudios = existing.sentenceAudios.filter(sa => sa.index !== index);
          existing.sentenceAudios.push({ index, audio: MoDB.base64ToBuffer(b64) });
          await MoDB.putAudio(existing);
          count++;
        } catch (e) {
          console.warn(`Failed importing sentence audio for ${key}`);
        }
      }
    }
    return count;
  }

  async function cacheCount() {
    const all = await MoDB.getAll(MoDB.S.AUDIO);
    let count = 0;
    for (const a of all) {
      if (a.wordAudio) count++;
      count += (a.sentenceAudios || []).length;
    }
    return count;
  }

  return {
    saveWordAudio,
    loadWordAudio,
    saveSentenceAudio,
    loadSentenceAudio,
    exportAll,
    importAll,
    cacheCount
  };
})();

/* ── js/audio.js ── */
/* ──────────────────────────────────────────────
   AUDIO MODULE
   ────────────────────────────────────────────── */
const Audio = (() => {
  const MINIMAX_URL = 'https://api.minimax.io/v1/t2a_v2';
  let _currentAudio = null;

  function hexToBuffer(hex) {
    const bytes = new Uint8Array(hex.length / 2);
    for (let i = 0; i < bytes.length; i++) bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
    return bytes.buffer;
  }

  function playBuffer(buf) {
    if (_currentAudio) { _currentAudio.pause(); URL.revokeObjectURL(_currentAudio.src); }
    const blob = new Blob([buf], { type: 'audio/mpeg' });
    const url = URL.createObjectURL(blob);
    _currentAudio = new window.Audio(url);
    _currentAudio.onended = () => { URL.revokeObjectURL(url); setBtn('idle'); };
    _currentAudio.onerror = () => { setBtn('idle'); };
    _currentAudio.play().catch(() => setBtn('idle'));
    setBtn('playing');
  }

  function speakFallback(text) {
    if (!window.speechSynthesis) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = 0.85;
    const voices = speechSynthesis.getVoices();
    const zh = voices.find(v => v.lang.startsWith('zh') && v.localService === false)
      || voices.find(v => v.lang.startsWith('zh'));
    if (zh) u.voice = zh;
    u.onend = () => setBtn('idle');
    u.onerror = () => setBtn('idle');
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
    setBtn('playing');
  }

  const SVG_IDLE = `<svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
    <polygon points="4,3 16,10 4,17" fill="currentColor"/>
  </svg>`;
  const SVG_PLAYING = `<svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
    <rect x="3" y="3" width="5" height="14" rx="1.5" fill="currentColor"/>
    <rect x="12" y="3" width="5" height="14" rx="1.5" fill="currentColor"/>
  </svg>`;
  const SVG_LOADING = `<svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
    <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="2" stroke-dasharray="28 16" stroke-linecap="round"/>
  </svg>`;

  function setBtn(state) {
    const btn = document.getElementById('audio-btn');
    if (!btn) return;
    btn.classList.remove('loading', 'playing');
    if (state === 'loading') { btn.classList.add('loading'); btn.innerHTML = SVG_LOADING; }
    else if (state === 'playing') { btn.classList.add('playing'); btn.innerHTML = SVG_PLAYING; }
    else { btn.innerHTML = SVG_IDLE; }
  }

  async function fetchMinimax(hanzi, apiKey) {
    const body = {
      model: 'speech-2.8-hd',
      text: hanzi,
      voice_setting: { voice_id: 'moss_audio_e4ec37c8-eb33-11f0-aedc-f24cdda4c95e', speed: 0.85, vol: 1.3, pitch: 0 },
      audio_setting: { format: 'mp3', sample_rate: 32000, bitrate: 128000, channel: 1 }
    };
    let res;
    try {
      res = await fetch(MINIMAX_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify(body)
      });
    } catch (netErr) {
      throw new Error('Network error (CORS or connectivity): ' + netErr.message);
    }
    if (!res.ok) throw new Error('Minimax HTTP ' + res.status + ' ' + res.statusText);
    const json = await res.json();
    const code = json?.base_resp?.status_code ?? json?.status_code;
    if (code !== undefined && code !== 0) throw new Error('Minimax API error ' + code);
    const hex = json?.data?.audio;
    if (!hex || hex.length < 10) throw new Error('Minimax returned empty audio (hex missing)');
    return hexToBuffer(hex);
  }

  async function play(hanzi) {
    if (!hanzi) return;
    setBtn('loading');

    // 1. Check DB Cache
    const cachedBuf = await AudioDB.loadWordAudio(hanzi);
    if (cachedBuf) {
      playBuffer(cachedBuf);
      return;
    }

    // 2. Try Minimax
    const apiKey = Settings.get('minimaxKey');
    if (apiKey) {
      try {
        const buf = await fetchMinimax(hanzi, apiKey);
        await AudioDB.saveWordAudio(hanzi, buf);
        playBuffer(buf);
        return;
      } catch (err) {
        console.warn('Minimax TTS failed:', err.message, '. Falling back to Web Speech.');
      }
    }

    // 3. Fallback
    speakFallback(hanzi);
  }

  function initBtn() { setBtn('idle'); }

  async function exportCache() {
    return AudioDB.exportAll();
  }

  async function importCache(data) {
    return AudioDB.importAll(data);
  }

  async function cacheCount() {
    return AudioDB.cacheCount();
  }

  // Export fetchMinimax securely so Sentences panel can re-use it
  return { play, initBtn, exportCache, importCache, cacheCount, fetchMinimax };
})();

/* ── js/sentences.js ── */
/* ──────────────────────────────────────────────
   SENTENCES MODULE
   ────────────────────────────────────────────── */
const Sentences = (() => {
  const API_URL = 'https://openrouter.ai/api/v1/chat/completions';

  async function loadCached(hanzi) {
    try {
      const list = await MoDB.getSentencesByWord(hanzi);
      return list.length > 0 ? { zh: list[0].zh, es: list[0].es } : null;
    } catch (e) {
      return null;
    }
  }

  async function saveCache(hanzi, sentence) {
    try {
      await MoDB.putSentence({ wordId: hanzi, zh: sentence.zh, es: sentence.es });
    } catch (e) {}
  }

  async function generate(hanzi, translation, apiKey) {
    if (!apiKey) return null;

    const prompt = `Generate one example sentence in Chinese using the word "${hanzi}" (meaning: "${translation}").
The sentence must be natural, moderately complex, and show clear usage of the word in context.

Respond ONLY with a JSON object, no markdown formatting:
{
  "zh": "Chinese sentence using the word",
  "es": "Spanish translation"
}`;

    const body = {
      model: 'qwen/qwen3-235b-a22b-2507',
      response_format: { type: "json_object" },
      temperature: 0.7,
      max_tokens: 300,
      messages: [{ role: 'user', content: prompt }]
    };

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
          'HTTP-Referer': 'mo-chinese-study'
        },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const errorText = await res.text();
        console.error('OpenRouter returned an error:', errorText);
        throw new Error(`API request failed with status ${res.status}: ${errorText}`);
      }
      const data = await res.json();
      const content = data.choices[0].message.content;
      const cleanContent = content.replace(/```json\n?/i, '').replace(/```/i, '').trim();
      return JSON.parse(cleanContent);
    } catch (e) {
      console.error('Sentence generation failed:', e);
      return null;
    }
  }

  async function getOrGenerate(hanzi, translation, apiKey) {
    let s = await loadCached(hanzi);
    if (s) return s;
    if (!apiKey) return null;
    s = await generate(hanzi, translation, apiKey);
    if (s) await saveCache(hanzi, s);
    return s;
  }

  async function exportAll() {
    const all = await MoDB.getAll(MoDB.S.SENTENCES);
    const out = {};
    for (const s of all) {
      out[s.wordId] = { zh: s.zh, es: s.es };
    }
    return out;
  }

  async function importAll(data) {
    if(!data) return;
    for(const [hanzi, sentence] of Object.entries(data)) {
      await saveCache(hanzi, sentence);
    }
  }

  return { loadCached, saveCache, generate, getOrGenerate, exportAll, importAll };
})();

/* ── js/visuals/inkBg.js ── */
/* ──────────────────────────────────────────────
   INK BACKGROUND
   ────────────────────────────────────────────── */
const InkBG = (() => {
  const cv = document.getElementById('ink-canvas');
  if (!cv) return { setHue() {} }; // safety when included before DOM
  const ctx = cv.getContext('2d');
  let W, H, t = 0, hue = 220, targetHue = 220;
  function resize() { cv.width = W = innerWidth; cv.height = H = innerHeight; }
  resize(); window.addEventListener('resize', resize);
  function noise(x, y, t) { return Math.sin(x * .003 + t * .4) * Math.cos(y * .002 + t * .3) * Math.sin((x + y) * .001 + t * .2); }
  const B = [{ ox: .2, oy: .2, r: .35, sp: 1 }, { ox: .8, oy: .7, r: .4, sp: .7 }, { ox: .5, oy: .5, r: .3, sp: 1.3 }, { ox: .1, oy: .8, r: .25, sp: .9 }, { ox: .9, oy: .2, r: .28, sp: 1.1 }];
  function draw() {
    ctx.clearRect(0, 0, W, H);
    hue += (targetHue - hue) * .005;
    const light = document.body.classList.contains('light');
    if (light) {
      ctx.fillStyle = '#f5f0e8'; ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 3; i++) { const x = (Math.sin(t * .1 + i * 2.1) * .5 + .5) * W, y = (Math.cos(t * .08 + i * 1.7) * .5 + .5) * H, g = ctx.createRadialGradient(x, y, 0, x, y, 220 + i * 70); g.addColorStop(0, 'rgba(180,140,80,.05)'); g.addColorStop(1, 'rgba(180,140,80,0)'); ctx.fillStyle = g; ctx.fillRect(0, 0, W, H); }
    } else {
      ctx.fillStyle = '#080a0e'; ctx.fillRect(0, 0, W, H);
      B.forEach((b, i) => { const px = noise(i * 100, 0, t * b.sp) * .15, py = noise(0, i * 100, t * b.sp * .8) * .15, x = (b.ox + px) * W, y = (b.oy + py) * H, r = b.r * Math.min(W, H), h = ((hue + i * 22 + noise(i * 50, i * 30, t * .2) * 30) % 360 + 360) % 360, g = ctx.createRadialGradient(x, y, 0, x, y, r); g.addColorStop(0, `hsla(${h},40%,12%,.5)`); g.addColorStop(.5, `hsla(${h},30%,8%,.25)`); g.addColorStop(1, `hsla(${h},20%,5%,0)`); ctx.fillStyle = g; ctx.fillRect(0, 0, W, H); });
      const rx = W * .5 + Math.sin(t * .3) * W * .1, ry = H * .4 + Math.cos(t * .25) * H * .1, rg = ctx.createRadialGradient(rx, ry, 0, rx, ry, W * .3); rg.addColorStop(0, 'rgba(180,40,30,.06)'); rg.addColorStop(1, 'rgba(180,40,30,0)'); ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
    }
    t += .008; requestAnimationFrame(draw);
  }
  // We'll init this inside app.js when DOM is ready, or rely on defer/module behavior.
  draw();
  return { setHue(h) { targetHue = h; } };
})();

/* ── js/visuals/particles.js ── */
/* ──────────────────────────────────────────────
   PARTICLE SYSTEM
   ────────────────────────────────────────────── */
const Particles = (() => {
  const cv = document.getElementById('particle-canvas');
  if (!cv) return { burst() {} };
  const ctx = cv.getContext('2d');
  let W, H, pool = [];
  function resize() { cv.width = W = innerWidth; cv.height = H = innerHeight; }
  resize(); window.addEventListener('resize', resize);
  class P {
    constructor(x, y, type) {
      this.x = x; this.y = y; this.type = type; this.life = 1;
      const a = Math.random() * Math.PI * 2, sp = 1 + Math.random() * (type === 'ink' ? 6 : type === 'gold' ? 4 : 3);
      this.vx = Math.cos(a) * sp; this.vy = Math.sin(a) * sp - (type === 'gold' ? 2 : 0);
      this.sz = type === 'ink' ? 3 + Math.random() * 8 : type === 'gold' ? 2 + Math.random() * 5 : 2 + Math.random() * 4;
      this.decay = .018 + Math.random() * .015;
      this.grav = type === 'ink' ? .12 : type === 'gold' ? -.05 : .06;
      this.rot = Math.random() * Math.PI * 2; this.rotSp = (Math.random() - .5) * .15;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vy += this.grav; this.vx *= .96; this.life -= this.decay; this.sz *= .97; this.rot += this.rotSp; }
    draw(c) {
      if (this.life <= 0) return;
      c.save(); c.globalAlpha = Math.max(0, this.life) * .9; c.translate(this.x, this.y); c.rotate(this.rot);
      if (this.type === 'ink') { c.fillStyle = `rgba(20,10,10,${this.life})`; c.beginPath(); c.ellipse(0, 0, this.sz, this.sz * .6, 0, 0, Math.PI * 2); c.fill(); }
      else if (this.type === 'gold') { const g = c.createRadialGradient(0, 0, 0, 0, 0, this.sz); g.addColorStop(0, `rgba(255,210,80,${this.life})`); g.addColorStop(1, 'rgba(200,150,30,0)'); c.fillStyle = g; c.beginPath(); c.arc(0, 0, this.sz, 0, Math.PI * 2); c.fill(); }
      else if (this.type === 'smoke') { c.fillStyle = `rgba(40,30,30,${this.life * .6})`; c.beginPath(); c.arc(0, 0, this.sz, 0, Math.PI * 2); c.fill(); }
      else { c.strokeStyle = `rgba(200,57,43,${this.life})`; c.lineWidth = 1.5; c.beginPath(); c.moveTo(0, 0); c.lineTo(this.vx * 3, this.vy * 3); c.stroke(); }
      c.restore();
    }
  }
  function loop() { ctx.clearRect(0, 0, W, H); pool = pool.filter(p => p.life > 0); pool.forEach(p => { p.update(); p.draw(ctx); }); requestAnimationFrame(loop); }
  loop();
  return { burst(x, y, type, n) { for (let i = 0; i < n; i++) pool.push(new P(x, y, type)); } };
})();

/* ── js/ui/dom.js ── */
let _tt;
function showToast(msg, ms = 2200) {
  const el = document.getElementById('toast');
  if(!el) return;
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), ms);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderMastery(elId, word) {
  const sc = SRS.score(word), hi = SRS.isHidden(word);
  const el = document.getElementById(elId); 
  if(!el) return;
  el.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    if (hi) { d.className = 'mdot hidden-lit'; }
    else { d.className = 'mdot' + (i < sc ? ' lit' : ''); }
    el.appendChild(d);
  }
}

function updateTopBar() {
  const s = State.session, max = Settings.get('sessionSize');
  if (!s) return;
  document.getElementById('stat-streak').textContent = s.streak;
  document.getElementById('stat-acc').textContent = (s.total > 0 ? Math.round(s.correct / s.total * 100) : 0) + '%';
  document.getElementById('stat-prog').textContent = `${s.count}/${max}`;
  document.getElementById('progress-fill').style.width = (s.count / max * 100) + '%';
}

function cardCenter() {
  const r = document.getElementById('card-flipper').getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

function applyTheme(t) { 
  document.body.classList.toggle('light', t === 'light'); 
  Settings.set('theme', t); 
}

function toggleTheme() { 
  const n = Settings.get('theme') === 'dark' ? 'light' : 'dark'; 
  applyTheme(n); 
  showToast(n === 'light' ? '☀ Rice paper' : '🌑 Ink mode'); 
}

/* ── js/ui/sentencePanel.js ── */
let _currentSentenceAudioUrl = null;

const SVG_PLAY = `<svg viewBox="0 0 20 20" fill="none" width="12" height="12"><polygon points="4,3 16,10 4,17" fill="currentColor"/></svg>`;
const SVG_GEN = `<svg viewBox="0 0 20 20" fill="none" width="12" height="12"><path d="M10 2v16M2 10h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;

async function populateSentencePanel(word) {
  const panelFront = document.getElementById('sentence-front');
  const panelBack = document.getElementById('sentence-back');
  const zhEl = document.getElementById('sentence-zh');
  const esEl = document.getElementById('sentence-es');
  const audioBtn = document.getElementById('sentence-audio-btn');
  
  if (!panelFront || !panelBack || !zhEl || !esEl || !audioBtn) return;
  
  panelFront.classList.remove('visible');
  panelBack.classList.remove('visible');
  zhEl.innerHTML = ''; esEl.innerHTML = '';
  audioBtn.style.display = 'none'; audioBtn.className = '';
  
  const [hanzi, translation] = word;
  const apiKey = Settings.get('openrouterKey');
  let sentenceObj = await Sentences.loadCached(hanzi);
  
  if (!sentenceObj && !apiKey) return;
  
  if (!sentenceObj) {
    zhEl.innerHTML = '<div class="skeleton" id="sentence-zh-skeleton"></div>';
    audioBtn.style.display = 'flex'; audioBtn.innerHTML = SVG_GEN;
    audioBtn.onclick = async (e) => {
      e.stopPropagation();
      audioBtn.classList.add('loading');
      sentenceObj = await Sentences.getOrGenerate(hanzi, translation, apiKey);
      if (sentenceObj) renderSentenceData(sentenceObj, hanzi);
      else {
        panelFront.classList.remove('visible');
        panelBack.classList.remove('visible');
      }
    };
    panelFront.classList.add('visible');
    panelBack.classList.add('visible');
    return;
  }
  renderSentenceData(sentenceObj, hanzi);
  panelFront.classList.add('visible');
  panelBack.classList.add('visible');
}

async function renderSentenceData(sentenceObj, hanzi) {
  const zhEl = document.getElementById('sentence-zh');
  const esEl = document.getElementById('sentence-es');
  const audioBtn = document.getElementById('sentence-audio-btn');
  if (!zhEl || !esEl || !audioBtn) return;
  
  const zh = sentenceObj.zh;
  zhEl.textContent = zh;
  esEl.textContent = sentenceObj.es;
  audioBtn.style.display = 'flex'; audioBtn.classList.remove('loading');
  
  const cachedBuf = await AudioDB.loadSentenceAudio(hanzi, 0);
  if (cachedBuf) {
    audioBtn.innerHTML = SVG_PLAY;
    audioBtn.onclick = (e) => { e.stopPropagation(); playSentenceAudio(cachedBuf); };
  } else {
    audioBtn.innerHTML = SVG_GEN;
    audioBtn.onclick = async (e) => {
      e.stopPropagation();
      const mk = Settings.get('minimaxKey');
      if (!mk) { showToast('Minimax API key missing'); return; }
      audioBtn.classList.add('loading');
      try {
        const buf = await Audio.fetchMinimax(zh, mk);
        await AudioDB.saveSentenceAudio(hanzi, 0, buf);
        audioBtn.innerHTML = SVG_PLAY; audioBtn.classList.remove('loading');
        audioBtn.onclick = (ev) => { ev.stopPropagation(); playSentenceAudio(buf); };
        playSentenceAudio(buf);
      } catch (err) {
        audioBtn.classList.remove('loading');
        console.error('Sentence audio save failed:', err);
        showToast('Error saving sentence audio');
      }
    };
  }
  if (!Settings.get('minimaxKey') && !cachedBuf) audioBtn.style.display = 'none';
}

function playSentenceAudio(buf) {
  const btn = document.getElementById('sentence-audio-btn');
  if (btn) btn.classList.add('playing');
  if (_currentSentenceAudioUrl) URL.revokeObjectURL(_currentSentenceAudioUrl);
  const blob = new Blob([buf], { type: 'audio/mpeg' });
  _currentSentenceAudioUrl = URL.createObjectURL(blob);
  const a = new window.Audio(_currentSentenceAudioUrl);
  a.onended = () => btn && btn.classList.remove('playing');
  a.onerror = () => btn && btn.classList.remove('playing');
  a.play().catch(() => btn && btn.classList.remove('playing'));
}

/* ── js/ui/cardRenderer.js ── */
let _pinyinTimer;

function toPinyin(text) {
  if (!text || !window.pinyinPro) return '';
  return window.pinyinPro.pinyin(text, { toneType: 'symbol', type: 'string' });
}

function renderCard(word, mode) {
  const [hanzi, translation] = word, isZh = mode === 'zh-es';

  document.getElementById('front-label').textContent = isZh ? 'CHINESE' : 'ESPAÑOL';
  document.getElementById('hanzi-display').textContent = isZh ? hanzi : translation;
  document.getElementById('stroke-btn').style.display = isZh ? 'block' : 'none';

  const pinEl = document.getElementById('pinyin-display');
  if(pinEl) {
    pinEl.classList.remove('visible'); clearTimeout(_pinyinTimer);
    if (isZh) {
      pinEl.textContent = toPinyin(hanzi);
      _pinyinTimer = setTimeout(() => pinEl.classList.add('visible'), 2000);
    } else { pinEl.textContent = ''; }
  }

  document.getElementById('back-label').textContent = isZh ? 'ESPAÑOL' : 'CHINESE';
  document.getElementById('back-hanzi').textContent = isZh ? '' : hanzi;
  document.getElementById('back-pinyin').textContent = isZh ? '' : toPinyin(hanzi);
  document.getElementById('translation').textContent = isZh ? translation : hanzi;

  renderMastery('mastery-dots-front', hanzi);
  renderMastery('mastery-dots-back', hanzi);

  const chars = [...hanzi].filter(c => /[\u4e00-\u9fff]/.test(c));
  document.getElementById('wm-tl').textContent = chars[0] || '一';
  document.getElementById('wm-br').textContent = chars[chars.length - 1] || '字';
  
  populateSentencePanel(word);
}

function flipCard() {
  const flipper = document.getElementById('card-flipper');
  const hint = document.getElementById('flip-hint');
  const row = document.getElementById('rating-row');
  if(!flipper) return;

  if (!State.isFlipped) {
    State.isFlipped = true;
    flipper.classList.add('flipped');
    clearTimeout(_pinyinTimer);
    document.getElementById('pinyin-display').classList.add('visible');
    hint.style.display = 'none';
    row.classList.add('visible');
  } else {
    State.isFlipped = false;
    flipper.classList.remove('flipped');
    hint.style.display = 'block';
    row.classList.remove('visible');
    if (State.mode === 'zh-es') {
      const pinEl = document.getElementById('pinyin-display');
      pinEl.classList.remove('visible'); clearTimeout(_pinyinTimer);
      _pinyinTimer = setTimeout(() => pinEl.classList.add('visible'), 2000);
    }
  }
}

const Stroke = (() => {
  let writers = [];
  function replayAll() {
    writers.forEach((w, i) => setTimeout(() => { try { w.animateCharacter(); } catch (e) { } }, i * 600));
  }
  function open() {
    if (!State.current || typeof window.HanziWriter === 'undefined') return;
    const [hanzi] = State.current;
    const chars = [...hanzi].filter(c => /[\u4e00-\u9fff]/.test(c));
    document.getElementById('stroke-title').textContent = hanzi + ' · 笔顺';
    const cont = document.getElementById('stroke-chars');
    cont.innerHTML = ''; writers = [];
    if (chars.length === 0) {
      cont.innerHTML = '<p style="font-family:var(--font-mono);font-size:11px;color:var(--text2)">No Chinese characters</p>';
    } else {
      const light = document.body.classList.contains('light');
      chars.forEach((c, i) => {
        const wrap = document.createElement('div'); wrap.className = 'stroke-char-wrap';
        const box = document.createElement('div'); box.id = `hw-${i}`;
        box.style.cssText = 'width:140px;height:140px;background:var(--surface);border:1px solid var(--border);border-radius:10px';
        const lbl = document.createElement('div'); lbl.className = 'stroke-char-lbl'; lbl.textContent = c;
        wrap.appendChild(box); wrap.appendChild(lbl); cont.appendChild(wrap);
        try {
          const w = window.HanziWriter.create(`hw-${i}`, c, { width: 140, height: 140, padding: 10, strokeColor: light ? '#1a1208' : '#e8dcc8', outlineColor: light ? 'rgba(0,0,0,.08)' : 'rgba(255,255,255,.07)', drawingColor: '#c8392b', strokeAnimationSpeed: 1, delayBetweenStrokes: 280, radicalColor: '#d4a843' });
          writers.push(w);
        } catch (e) { box.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--font-zh);font-size:64px;color:var(--text)">${c}</div>`; }
      });
    }
    document.getElementById('stroke-modal').classList.add('open');
    setTimeout(replayAll, 300);
  }
  function close() {
    document.getElementById('stroke-modal').classList.remove('open');
    writers.forEach(w => { try { w.cancelAnimation && w.cancelAnimation(); } catch (e) { } });
    writers = [];
  }
  return { open, close, replayAll };
})();

/* ── js/features/studySession.js ── */
function setMode(m) {
  State.mode = m;
  const btnZh = document.getElementById('mode-btn-zh');
  const btnEs = document.getElementById('mode-btn-es');
  if(btnZh) btnZh.classList.toggle('active', m === 'zh-es');
  if(btnEs) btnEs.classList.toggle('active', m === 'es-zh');
  if (State.current) renderCard(State.current, m);
}

function startSession() {
  State.session = { correct: 0, wrong: 0, total: 0, streak: 0, bestStreak: 0, count: 0 };
  State.isFlipped = false;
  showScreen('screen-study');
  nextCard();
}

function nextCard() {
  const max = Settings.get('sessionSize');
  if (State.session.count >= max) { endSession(); return; }

  State.current = SRS.pick(State.dictionary);
  State.isFlipped = false;
  State.session.count++;

  const flipper = document.getElementById('card-flipper');
  if(flipper) flipper.classList.remove('flipped');
  const hint = document.getElementById('flip-hint');
  if(hint) hint.style.display = 'block';
  const row = document.getElementById('rating-row');
  if(row) row.classList.remove('visible');

  renderCard(State.current, State.mode);

  const scene = document.getElementById('card-scene');
  if (scene) {
    scene.classList.remove('entering');
    void scene.offsetWidth; 
    scene.classList.add('entering');
  }

  InkBG.setHue(180 + Math.random() * 80);
  updateTopBar();
}

function rate(r) {
  if (!State.isFlipped) return;
  const [hanzi] = State.current;
  SRS.update(hanzi, r);
  const s = State.session; s.total++;
  const { x, y } = cardCenter();
  const flipper = document.getElementById('card-flipper');

  if (r === 2) {
    s.correct++; s.streak++;
    s.bestStreak = Math.max(s.bestStreak, s.streak);
    Particles.burst(x, y, 'gold', 40);
    Particles.burst(x, y, 'spark', 20);
    if(flipper) flipper.classList.add('anim-correct');
    setTimeout(() => flipper && flipper.classList.remove('anim-correct'), 600);
  } else if (r === 0) {
    s.wrong++; s.streak = 0;
    Particles.burst(x, y, 'ink', 28);
    Particles.burst(x, y, 'smoke', 12);
    if(flipper) flipper.classList.add('anim-shake');
    setTimeout(() => flipper && flipper.classList.remove('anim-shake'), 450);
  } else {
    s.streak = 0;
    Particles.burst(x, y, 'spark', 12);
  }
  updateTopBar();
  setTimeout(nextCard, 280);
}

function hideWord() {
  if (!State.current) return;
  const [hanzi] = State.current;
  SRS.hide(hanzi);
  showToast(`"${hanzi}" ocultada — no volverá a aparecer`);
  setTimeout(nextCard, 500);
}

function endSession() {
  const s = State.session;
  document.getElementById('res-correct').textContent = s.correct;
  document.getElementById('res-wrong').textContent = s.wrong;
  document.getElementById('res-streak').textContent = s.bestStreak;
  const ratio = s.total > 0 ? s.correct / s.total : 0;
  const titles = ['继续努力', '做得好', '很棒', '完美'];
  document.getElementById('res-title').textContent = titles[Math.min(3, Math.floor(ratio * 4))];
  document.getElementById('res-subtitle').textContent = `${s.total} palabras · ${Math.round(ratio * 100)}% correcto`;
  const cx = innerWidth / 2, cy = innerHeight / 2;
  Particles.burst(cx, cy, 'gold', 70); 
  Particles.burst(cx, cy, 'spark', 35);
  showScreen('screen-results');
}

/* ── js/features/backup.js ── */
function todayStr() { return new Date().toISOString().slice(0, 10); }

function downloadJSON(data, filename) {
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.style.display = 'none';
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

async function updateStorageStat() {
  const el = document.getElementById('storage-stat');
  if (!el) return;
  const audioWords = await Audio.cacheCount();
  const srsList = await MoDB.getAllSRS();
  const srsWords = srsList.length;
  el.textContent = `${srsWords} words studied · ${audioWords} audio cached`;
}

async function processJSON(raw) {
  try {
    var rawParsed = JSON.parse(raw);
    let parsed = rawParsed;
    if (parsed && typeof parsed === 'object' && !Array.isArray(parsed) && Array.isArray(parsed.words)) {
      parsed = parsed.words;
    }
    if (Array.isArray(parsed) && parsed.length > 0 && !Array.isArray(parsed[0]) && typeof parsed[0] === 'object') {
      parsed = parsed.map(function(e) {
        var hanzi = e.w || e.word || e.hanzi || e.chinese || '';
        var meaning = e.m || e.meaning || e.es || e.spanish || '';
        return [hanzi, meaning];
      });
    }

    if (!Array.isArray(parsed)) throw new Error();
    State.dictionary = parsed.filter(d => Array.isArray(d) && d.length >= 2);
    if (State.dictionary.length === 0) throw new Error();

    // Write dropped dictionary into MoDB so all apps share it in bulk
    MoDB.open().then(async function() {
      var importData = null;
      if (rawParsed && rawParsed.version === 4 && Array.isArray(rawParsed.words)) {
        importData = rawParsed;
      } else {
        var wordsList = State.dictionary.map(function(e) {
          var hanzi = e[0];
          var meaning = e[1];
          return {
            id: hanzi,
            hanzi: hanzi,
            pinyin: MoPinyin.getToned(hanzi),
            pinyinToneless: MoPinyin.getToneless(hanzi),
            meaning: meaning,
            source: 'cards_import',
            enriched: false,
            createdAt: Date.now(),
            updatedAt: Date.now()
          };
        });
        importData = {
          version: 4,
          words: wordsList
        };
      }
      console.log('[MoCards] Bulk importing/updating words in MoDB...');
      await MoDB.importAll(importData);
      console.log('[MoCards] Bulk import to MoDB completed successfully!');
    }).catch(function(e) {
      console.error('[MoCards] Failed to bulk import to MoDB:', e);
    });

    const badge = document.getElementById('word-count-badge');
    if(badge) {
      badge.style.display = 'block';
      badge.textContent = State.dictionary.length + ' WORDS LOADED';
    }
    const btnStart = document.getElementById('btn-start');
    if(btnStart) btnStart.style.display = 'inline-block';

    const dz = document.getElementById('drop-zone');
    if(dz) {
      const dropIcon = dz.querySelector('.drop-icon');
      const dropText = dz.querySelector('.drop-text');
      if(dropIcon) dropIcon.textContent = '✓';
      if(dropText) dropText.textContent = State.dictionary.length + ' words ready';
    }
  } catch (e) { showToast('Invalid JSON — expected [[hanzi, translation], ...]'); }
}

function readFile(f) { 
  const r = new FileReader(); 
  r.onload = async e => { await processJSON(e.target.result); }; 
  r.readAsText(f); 
}

async function fullBackup() {
  try {
    await MoBackup.exportAndDownload();
    showToast('Full backup saved ✓');
  } catch (err) {
    console.error('Backup error:', err);
    showToast('Error: ' + err.message);
  }
}

async function fullRestore(ev) {
  try {
    const b = JSON.parse(ev.target.result);
    
    // New unified format (v4)
    if (b.version === 4) {
      await MoBackup.fullImport(JSON.stringify(b));
      showToast('Restore completed ✓');
      updateStorageStat();
      return;
    }
    
    // Legacy formats (v1-v3)
    if (!b.version || !b.srs) throw new Error('Not a valid MO backup');
    const srsN = await SRS.importAll(JSON.stringify(b.srs));
    let audioN = 0;
    
    if (b.audio) {
        const audioData = typeof b.audio === 'string' ? JSON.parse(b.audio) : b.audio;
        if (b.version <= 2) {
          for (const [k, v] of Object.entries(audioData)) {
            if (k.startsWith('mo_audio_v1:')) localStorage.setItem(k, v);
          }
          await migrateAudio();
          audioN = Object.keys(audioData).length;
        } else {
          audioN = await Audio.importCache(audioData);
        }
    }
    
    if (b.sentences) await Sentences.importAll(b.sentences);

    if (b.settings) {
      if (b.settings.theme) { Settings.set('theme', b.settings.theme); applyTheme(b.settings.theme); }
      if (b.settings.cardScale) { 
        Settings.set('cardScale', b.settings.cardScale); 
        document.documentElement.style.setProperty('--card-scale', b.settings.cardScale); 
        const slider = document.getElementById('scale-slider');
        if(slider) slider.value = b.settings.cardScale; 
      }
      if (b.settings.sessionSize) Settings.set('sessionSize', b.settings.sessionSize);
    }
    showToast(`Restored: ${srsN} words · ${audioN} audio ✓`);
    updateStorageStat();
  } catch (err) {
    console.error('Restore error:', err);
    showToast('Restore failed — invalid backup file');
  }
}

/* ──────────────────────────────────────────────
   ALL EVENT BINDINGS
   ────────────────────────────────────────────── */
function bindEvents() {
  const dz = document.getElementById('drop-zone'), fi = document.getElementById('file-input');
  dz.addEventListener('click', () => fi.click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) readFile(f); });
  fi.addEventListener('change', e => { const f = e.target.files[0]; if (f) readFile(f); });

  document.getElementById('btn-start').addEventListener('click', startSession);
  document.getElementById('btn-demo').addEventListener('click', () => {
    State.dictionary = [
      ["你好", "hola"], ["谢谢", "gracias"], ["再现", "adiós"], ["中国", "China"], ["学习", "aprender"],
      ["朋友", "amigo/a"], ["今天", "hoy"], ["明天", "mañana"], ["吃饭", "comer"], ["喝水", "beber agua"],
      ["漂亮", "bonito/a"], ["聪明", "inteligente"], ["努力", "esforzarse"], ["快乐", "feliz"], ["生活", "vida"],
      ["音乐", "música"], ["电影", "película"], ["时间", "tiempo"], ["工作", "trabajo"], ["语言", "idioma"],
    ];
    processJSON(JSON.stringify(State.dictionary));
  });

  document.getElementById('card-flipper').addEventListener('click', flipCard);

  document.getElementById('btn-wrong').addEventListener('click', () => rate(0));
  document.getElementById('btn-almost').addEventListener('click', () => rate(1));
  document.getElementById('btn-correct').addEventListener('click', () => rate(2));

  document.getElementById('btn-hide').addEventListener('click', hideWord);

  document.getElementById('stroke-btn').addEventListener('click', e => { e.stopPropagation(); Stroke.open(); });
  document.getElementById('btn-stroke-replay').addEventListener('click', Stroke.replayAll);
  document.getElementById('btn-stroke-close').addEventListener('click', Stroke.close);
  document.getElementById('stroke-modal').addEventListener('click', e => { if (e.target === e.currentTarget) Stroke.close(); });

  document.getElementById('btn-theme').addEventListener('click', toggleTheme);
  document.getElementById('btn-end').addEventListener('click', endSession);
  document.getElementById('mode-btn-zh').addEventListener('click', () => setMode('zh-es'));
  document.getElementById('mode-btn-es').addEventListener('click', () => setMode('es-zh'));

  document.getElementById('btn-again').addEventListener('click', startSession);
  document.getElementById('btn-new-dict').addEventListener('click', () => showScreen('screen-import'));

  document.getElementById('audio-btn').addEventListener('click', e => {
    e.stopPropagation();
    if (State.current) Audio.play(State.current[0]);
  });

  document.getElementById('btn-key-save').addEventListener('click', () => {
    const k = document.getElementById('minimax-key').value.trim();
    const or_k = document.getElementById('openrouter-key').value.trim();
    if (!k && !or_k) { showToast('Enter at least one API key'); return; }
    if (k !== undefined) Settings.set('minimaxKey', k);
    if (or_k !== undefined) Settings.set('openrouterKey', or_k);
    const btn = document.getElementById('btn-key-save');
    btn.textContent = '✓ Saved'; btn.classList.add('saved');
    setTimeout(() => { btn.textContent = 'Save'; btn.classList.remove('saved'); }, 2000);
  });

  document.getElementById('btn-full-export').addEventListener('click', fullBackup);

  const fullFI = document.getElementById('full-file-input');
  document.getElementById('btn-full-import-trigger').addEventListener('click', () => fullFI.click());
  fullFI.addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = async ev => {
      await fullRestore(ev);
      fullFI.value = '';
    };
    r.readAsText(f);
  });

  document.getElementById('scale-slider').addEventListener('input', function() {
    const v = parseFloat(this.value);
    document.documentElement.style.setProperty('--card-scale', v);
    Settings.set('cardScale', v);
  });

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (!document.getElementById('screen-study').classList.contains('active')) return;
    if (e.code === 'Space') { e.preventDefault(); flipCard(); }
    if (State.isFlipped) {
      if (e.key === '1') rate(0);
      if (e.key === '2') rate(1);
      if (e.key === '3') rate(2);
      if (e.key === '4') hideWord();
    }
  });
}

  await MoDB.open();
  await MoSettings.init();
  await SRS.load();
  Settings.load();
  applyTheme(Settings.get('theme'));
  const sc = Settings.get('cardScale');
  const scaleSlider = document.getElementById('scale-slider');
  if(scaleSlider) scaleSlider.value = sc;
  document.documentElement.style.setProperty('--card-scale', sc);
  const savedKey = Settings.get('minimaxKey');

  if (savedKey && mmInput) mmInput.value = savedKey;

  const orInput = document.getElementById('openrouter-key');
  if (savedOrKey && orInput) orInput.value = savedOrKey;

  // Auto-load from MoDB if no dictionary was dropped yet

    try {
      const dbWords = await MoDB.getAllWords();
      if (dbWords && dbWords.length > 0) {
        State.dictionary = dbWords.map(w => [w.hanzi, w.meaning]);
        const badge = document.getElementById('word-count-badge');
        if(badge) {
          badge.style.display = 'block';
          badge.textContent = State.dictionary.length + ' WORDS FROM MoDB';
        }
        const btnStart = document.getElementById('btn-start');
        if(btnStart) btnStart.style.display = 'inline-block';
        const dz = document.getElementById('drop-zone');
        if(dz) {
          const dropIcon = dz.querySelector('.drop-icon');
          const dropText = dz.querySelector('.drop-text');
          if(dropIcon) dropIcon.textContent = '✓';
          if(dropText) dropText.textContent = State.dictionary.length + ' words ready (MoDB)';
        }

      }
    } catch (e) {
      console.warn('[MoCards] Auto-load from MoDB failed:', e);
    }
  }
})();

/* ──────────────────────────────────────────────
   ONE-TIME AUDIO MIGRATION (v1 -> v2)
   ────────────────────────────────────────────── */
async function migrateAudio() {
  if (localStorage.getItem('mo_idb_migrated')) return;
  
  console.log('Starting one-time migration to IndexedDB...');
  const keysToMigrate = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('mo_audio_v1:')) keysToMigrate.push(k);
  }

  function hexToBuffer(hex) {
    const bytes = new Uint8Array(hex.length / 2);
    for (let i = 0; i < bytes.length; i++) bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
    return bytes.buffer;
  }

  for (const k of keysToMigrate) {
    const hanzi = k.replace('mo_audio_v1:', '');
    const hex = localStorage.getItem(k);
    if (hex) {
      try {
        await AudioDB.saveWordAudio(hanzi, hexToBuffer(hex));
        localStorage.removeItem(k);
      } catch (e) {
        console.error('Migration failed for', hanzi, e);
      }
    }
  }
  
  localStorage.setItem('mo_idb_migrated', '1');
  console.log('Migration complete.');
}

// Ensure DOM is fully loaded before binding events
if(document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', async () => {
    bindEvents();
    Audio.initBtn();
    await migrateAudio();
    updateStorageStat();
  });
} else {
  bindEvents();
  Audio.initBtn();
  migrateAudio().then(updateStorageStat);
}
